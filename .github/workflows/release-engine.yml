name: Release THEBOX Engine

on:
  push:
    tags:
      - "engine-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-engine:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: engine/package-lock.json

      - name: Install engine dependencies
        working-directory: engine
        run: npm ci

      - name: Test engine
        working-directory: engine
        run: npm test

      - name: Build single executable
        working-directory: engine
        run: npm run build:sea

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: thebox-downloader-windows
          path: engine/dist/thebox-downloader.exe

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: engine/dist/thebox-downloader.exe
          generate_release_notes: true
